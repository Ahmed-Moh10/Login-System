<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="shortcut icon"
      href="images/pngtree-vector-add-user-icon-png-image_4102544.jpg"
      type="image/x-icon"
    />

    <!-- Font awesome -->
    <link rel="stylesheet" href="css/all.min.css" />
    <!-- bootstrap file -->
    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <!-- Main Style -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <section
      class="auth-section d-flex align-items-center justify-content-center py-4"
    >
      <div class="container">
        <div class="group auth-box mx-auto text-center p-4 p-md-5">
          <h1 class="mb-4">Smart Login System</h1>

          <input
            type="text"
            id="signupName"
            class="form-control my-3"
            placeholder="Enter your Name"
          />
          <input
            type="email"
            id="signupEmail"
            class="form-control my-3"
            placeholder="Enter your Email"
          />
          <input
            type="password"
            id="signupPass"
            class="form-control my-3"
            placeholder="Enter password"
          />

          <span id="exist" class="d-block mb-2"></span>

          <button id="signupbtn" class="btn btn-outline-info w-100 my-3">
            Sign Up
          </button>

          <p class="text-white mb-0">
            You have an account?
            <a
              href="index.html"
              class="text-white text-decoration-none fw-semibold"
              >Signin</a
            >
          </p>
        </div>
      </div>
    </section>

    <!-- bootstrap JS -->
    <script src="js/bootstrap.bundle.min.js"></script>
    <!-- Main JS -->
    <script src="js/index.js"></script>
  </body>
</html>
